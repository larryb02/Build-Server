syntax = "proto3";

package registry;

import "google/protobuf/timestamp.proto";

service Registry {
  // Runner-facing RPCs
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc Unregister(UnregisterRequest) returns (UnregisterResponse);

  // Scheduler-facing RPCs
  rpc ListAvailable(ListAvailableRequest) returns (ListAvailableResponse);

  // Admin RPCs (called by the REST API)
  rpc GenerateRegistrationToken(GenerateRegistrationTokenRequest) returns (GenerateRegistrationTokenResponse);
}

// --- Runner-facing ---

message RegisterRequest {
  string token = 1;
  string name  = 2;
}

message RegisterResponse {
  RunnerInfo runner = 1;
}

message HeartbeatRequest {
  int32 runner_id = 1;
}

message HeartbeatResponse {}

message UnregisterRequest {
  int32 runner_id = 1;
}

message UnregisterResponse {}

// --- Scheduler-facing ---

message ListAvailableRequest {}

message RunnerInfo {
  int32 runner_id                         = 1;
  string name                             = 2;
  string token                            = 3;
  RunnerHealth health                     = 4;
}

message ListAvailableResponse {
  repeated RunnerInfo runners = 1;
}

enum RunnerHealth {
  UNKNOWN   = 0;
  UNHEALTHY = 1;
  HEALTHY   = 2;
}

// --- Admin ---

message GenerateRegistrationTokenRequest {}

message GenerateRegistrationTokenResponse {
  string token                          = 1;
  google.protobuf.Timestamp created_at  = 2;
  google.protobuf.Timestamp expires_at  = 3;
}
